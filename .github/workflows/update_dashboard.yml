name: Update Dashboard Data

on:
  push:
    paths:
      - "uploads/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run data pipeline
        run: python pipeline/update_data.py

      - name: Commit and push data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.js docs/data_sales.js
          if git diff --staged --quiet; then
            echo "No changes to data.js — skipping commit."
          else
            DATE=$(python -c "import json,pathlib; txt=pathlib.Path('docs/data.js').read_text(); raw=json.loads(txt[len('const RAW ='):-1]); print(raw['latest'])")
            git commit -m "Auto-update dashboard data for $DATE [skip ci]"
            git push
            echo "Committed and pushed."
          fi
